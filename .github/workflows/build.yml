name: Build iOS IPA

# Запускается когда ты пушишь код на GitHub
on:
  workflow_dispatch: # Только вручную по кнопке в GitHub

jobs:
  build:
    runs-on: macos-14  # GitHub даёт бесплатный Mac с Xcode

    steps:
    # Шаг 1 — скачиваем твой код
    - name: Checkout code
      uses: actions/checkout@v4

    # Шаг 2 — выбираем версию Xcode
    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    # Шаг 3 — собираем приложение
    - name: Build IPA
      run: |
        xcodebuild clean \
          -project MusicPlayer.xcodeproj \
          -scheme MusicPlayer
        
        xcodebuild archive \
          -project MusicPlayer.xcodeproj \
          -scheme MusicPlayer \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/MusicPlayer.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ONLY_ACTIVE_ARCH=NO

    # Шаг 4 — упаковываем .app в .ipa
    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r build/MusicPlayer.xcarchive/Products/Applications/MusicPlayer.app Payload/
        zip -r MusicPlayer.ipa Payload/
        echo "IPA создан успешно!"

    # Шаг 5 — сохраняем IPA чтобы можно было скачать
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: MusicPlayer-IPA
        path: MusicPlayer.ipa
        retention-days: 30  # Хранится 30 дней
